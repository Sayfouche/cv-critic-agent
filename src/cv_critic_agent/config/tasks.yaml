global_report:
  description: Audit the full public CV, portfolio and chatbot using public sources only.
  expected_output: Markdown file global.md with the required critique sections.

printable_cv_report:
  description: Audit only the printable/downloadable CV route and related CV sources.
  expected_output: Markdown file printable-cv.md with readability, ATS and credibility sections.

strategy_report:
  description: Read context.md plus the two critique reports and produce an action plan.
  expected_output: Markdown file strategy.md with synthesis, tensions, decisions, P0/P1/P2 and next increment.
